<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<style>
    .boton-magico {
        background-color: blue;
        color: white;
        padding: 15px;
        transform: scale(1);
        /* Tamaño original */
        /* Le decimos que cualquier cambio de estilo tardará medio segundo de forma fluida */
        transition: all 0.5s ease;
    }



    .boton-magico:hover {
        background-color: darkblue;
        transform: scale(1.1);
        /* Crece un 10% al pasar el mouse */
    }
</style>

<body>
    <button class="boton-magico">Pasa el ratón por aquí</button>
</body>

</html>
