<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones</title>

    <script>
        function mayor_edad(edad) {
            let mayor = false;
            if (edad >= 18)
                mayor = true;
            return mayor;
        }
        function hello(name) {
            alert("Hello, welcome to my webpage" + name)

        }

        //Ejemplo con valor 15 
        console.log(mayor_edad(15))

        //Ejemplo con valor 18
        console.log(mayor_edad(18));


        let name = prompt("Dame tu nombre");
        hello(name);

        let age = prompt("Dame tu edad");

        if (mayor_edad(age)) {

            //mayor de edad permite ingreso
            alert("Bienvenido");
        } else {


            //menor de edad restringe 
            alert("No puedes ingresar a la web");
        }


    </script>
</head>

</body>

</html>
